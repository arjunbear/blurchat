name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel old runs when a new push hits the same branch — saves CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

# Nx Cloud picks this up automatically — write access for CI to populate the cache.
# Read access works without it (via nxCloudId in nx.json), so missing-secret = read-only.
env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # nx affected needs git history to diff

      - uses: pnpm/action-setup@v6
        # version comes from the packageManager field in package.json (pnpm@11.1.3)

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc   # → Node 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Set base/head SHAs so `nx affected` knows what changed
      - uses: nrwl/nx-set-shas@v5

      # Only run targets for projects affected by the diff — cheap as the monorepo grows
      - run: pnpm nx affected -t lint typecheck build

      # Nx Cloud Self-Healing CI — analyzes failures and (when applicable) opens
      # an auto-fix PR. `if: always()` so it runs even when previous steps failed.
      - run: pnpm exec nx fix-ci
        if: always()

  # Supply-chain check on PRs: fails if a PR introduces a dependency with a
  # known CVE at "high" severity or above. Runs only on pull_request events.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # lets the action comment a summary on the PR
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
